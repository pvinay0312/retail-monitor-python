[phases.setup]
nixPkgs = ["python311", "chromium", "playwright-driver"]

[phases.install]
cmds = [
  "python3 -m pip install -r requirements.txt",
  "playwright install chromium --with-deps"
]

[start]
cmd = "python main.py"

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/root/.cache/ms-playwright"
PYTHONUNBUFFERED = "1"
